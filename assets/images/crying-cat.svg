<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="Crying cat">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e0f2fe"/>
      <stop offset="1" stop-color="#c7d2fe"/>
    </linearGradient>
    <linearGradient id="fur" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="1" stop-color="#fde68a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity=".18"/>
    </filter>
  </defs>

  <rect width="240" height="240" rx="28" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <!-- ears -->
    <path d="M62 92c-6-22 2-50 18-64 14 14 22 42 18 64" fill="url(#fur)" stroke="#a16207" stroke-opacity=".35" stroke-width="3" stroke-linejoin="round"/>
    <path d="M178 92c6-22-2-50-18-64-14 14-22 42-18 64" fill="url(#fur)" stroke="#a16207" stroke-opacity=".35" stroke-width="3" stroke-linejoin="round"/>
    <path d="M71 54c-4-10 0-24 9-32 8 8 13 22 10 33" fill="#fecdd3" opacity=".75"/>
    <path d="M169 54c4-10 0-24-9-32-8 8-13 22-10 33" fill="#fecdd3" opacity=".75"/>

    <!-- face -->
    <path d="M120 74c-44 0-74 30-74 74 0 44 30 74 74 74s74-30 74-74c0-44-30-74-74-74Z" fill="url(#fur)" stroke="#a16207" stroke-opacity=".35" stroke-width="3"/>

    <!-- sad eyes -->
    <path d="M78 140c10-10 26-10 36 0" fill="none" stroke="#111827" stroke-width="6" stroke-linecap="round" opacity=".85"/>
    <path d="M126 140c10-10 26-10 36 0" fill="none" stroke="#111827" stroke-width="6" stroke-linecap="round" opacity=".85"/>

    <!-- tears -->
    <path d="M98 146c-8 14-10 28-2 40 8-12 10-26 2-40Z" fill="#38bdf8" opacity=".85"/>
    <path d="M156 146c-8 14-10 28-2 40 8-12 10-26 2-40Z" fill="#38bdf8" opacity=".85"/>

    <!-- nose + mouth -->
    <path d="M120 155l-9 7c6 6 12 6 18 0Z" fill="#fb7185" opacity=".95"/>
    <path d="M104 176c10-10 22-12 32-6" fill="none" stroke="#9a3412" stroke-opacity=".6" stroke-width="5" stroke-linecap="round"/>
    <path d="M136 170c10-6 22-4 32 6" fill="none" stroke="#9a3412" stroke-opacity=".6" stroke-width="5" stroke-linecap="round"/>

    <!-- whiskers -->
    <path d="M60 156c18-6 32-7 44-4" fill="none" stroke="#9a3412" stroke-opacity=".45" stroke-width="3" stroke-linecap="round"/>
    <path d="M60 170c18-2 32-1 44 4" fill="none" stroke="#9a3412" stroke-opacity=".45" stroke-width="3" stroke-linecap="round"/>
    <path d="M180 156c-18-6-32-7-44-4" fill="none" stroke="#9a3412" stroke-opacity=".45" stroke-width="3" stroke-linecap="round"/>
    <path d="M180 170c-18-2-32-1-44 4" fill="none" stroke="#9a3412" stroke-opacity=".45" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
